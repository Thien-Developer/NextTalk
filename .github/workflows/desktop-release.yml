name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0)"
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install
        working-directory: web

      - name: Build web (static export for Electron)
        run: pnpm build
        working-directory: web
        env:
          NEXT_BUILD_TARGET: electron
          NEXT_PUBLIC_API_URL: http://44.200.84.42:3000
          NEXT_PUBLIC_WS_URL: http://44.200.84.42:3000
          NEXT_PUBLIC_CALL_WS_URL: http://44.200.84.42:3000/call

      - name: Install desktop dependencies
        run: pnpm install
        working-directory: desktop

      - name: Generate icons
        run: node scripts/generate-icons.js
        working-directory: desktop

      - name: Compile TypeScript
        run: npx tsc
        working-directory: desktop

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NextTalk-Windows
          path: |
            desktop/release/*.exe
            desktop/release/*.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install
        working-directory: web

      - name: Build web (static export for Electron)
        run: pnpm build
        working-directory: web
        env:
          NEXT_BUILD_TARGET: electron
          NEXT_PUBLIC_API_URL: http://44.200.84.42:3000
          NEXT_PUBLIC_WS_URL: http://44.200.84.42:3000
          NEXT_PUBLIC_CALL_WS_URL: http://44.200.84.42:3000/call

      - name: Install desktop dependencies
        run: pnpm install
        working-directory: desktop

      - name: Generate icons
        run: node scripts/generate-icons.js
        working-directory: desktop

      - name: Compile TypeScript
        run: npx tsc
        working-directory: desktop

      - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NextTalk-macOS
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.yml

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NextTalk-Windows/*.exe
            NextTalk-macOS/*.dmg
            NextTalk-macOS/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
